<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>QR · Ka Luy de Aliaga</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0B08;
  --cream: #F2EAD9;
  --cream2: #C8BEA8;
  --cream3: #8A8070;
  --gold: #B89A5A;
  --gold2: #7A6535;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  font-family: var(--sans);
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  gap: 0;
  position: relative;
}

/* grain */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  opacity: 0.3;
  pointer-events: none;
}

.card {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 320px;
  gap: 0;
}

.top-rule {
  width: 40px;
  height: 1px;
  background: var(--gold);
  margin-bottom: 1.8rem;
}

.eyebrow {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
  text-align: center;
}

.name {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 300;
  line-height: 1.0;
  color: var(--cream);
  text-align: center;
  margin-bottom: 0.3rem;
}

.name em { font-style: italic; color: var(--gold); }

.alias {
  font-family: var(--serif);
  font-size: 0.85rem;
  font-style: italic;
  color: var(--cream3);
  text-align: center;
  margin-bottom: 2rem;
}

/* QR frame */
.qr-outer {
  position: relative;
  padding: 1px;
  margin-bottom: 1.4rem;
}

/* corner brackets */
.qr-outer::before,
.qr-outer::after,
.qr-outer .br,
.qr-outer .bl {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-color: var(--gold);
  border-style: solid;
}
.qr-outer::before { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
.qr-outer::after  { top: -2px; right: -2px; border-width: 2px 2px 0 0; }
.qr-outer .br     { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }
.qr-outer .bl     { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; }

.qr-inner {
  background: var(--bg);
  border: 1px solid rgba(184,154,90,0.2);
  padding: 1rem;
  border-radius: 2px;
}

#qr-canvas { display: block; }

.instruction {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  color: var(--cream3);
  text-align: center;
  line-height: 1.7;
  margin-bottom: 1.8rem;
  max-width: 220px;
}

.instruction strong {
  color: var(--cream2);
  font-weight: 400;
}

.url-display {
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  color: var(--gold2);
  text-align: center;
  word-break: break-all;
  max-width: 260px;
  margin-bottom: 1.8rem;
}

.bottom-rule {
  width: 40px;
  height: 1px;
  background: rgba(184,154,90,0.3);
}

.tagline {
  font-family: var(--serif);
  font-size: 0.78rem;
  font-style: italic;
  color: var(--cream3);
  text-align: center;
  margin-top: 1rem;
}
</style>
</head>
<body>

<div class="card">
  <div class="top-rule"></div>
  <p class="eyebrow">Portafolio literario</p>
  <h1 class="name">Ka <em>Luy de</em><br>Aliaga</h1>
  <p class="alias">Kuy · Ka · Escritora</p>

  <div class="qr-outer">
    <div class="br"></div>
    <div class="bl"></div>
    <div class="qr-inner">
      <div id="qr-canvas"></div>
    </div>
  </div>

  <p class="instruction">
    <strong>Escaneá con la cámara</strong><br>
    No requiere app. Acceso inmediato<br>a obras y páginas de muestra.
  </p>

  <p class="url-display" id="url-display">—</p>

  <div class="bottom-rule"></div>
  <p class="tagline">Narrativa infantil · No ficción · Novela</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ──────────────────────────────────────────────
   ✏️ ÚNICO CAMBIO QUE TENÉS QUE HACER:
   Reemplazá la URL de abajo con tu URL de Netlify
   una vez que publiques el portafolio.
   Ejemplo: "https://luydealiaga.github.io/kaluydealiaga"
────────────────────────────────────────────── */
const URL_PORTFOLIO = "https://luydealiaga.github.io/kaluydealiaga";

document.getElementById('url-display').textContent = URL_PORTFOLIO;

new QRCode(document.getElementById("qr-canvas"), {
  text: URL_PORTFOLIO,
  width: 200,
  height: 200,
  colorDark: "#F2EAD9",
  colorLight: "#0C0B08",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
